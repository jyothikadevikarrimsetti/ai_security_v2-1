name: CI (Build & Push)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── XenSQL ──
      - name: Build & Push XenSQL
        uses: docker/build-push-action@v5
        with:
          context: ./xensql
          file: ./xensql/Dockerfile
          push: true
          tags: jyothika2832/ai_security_v2-3-xensql:latest

      # ── QueryVault ──
      - name: Build & Push QueryVault
        uses: docker/build-push-action@v5
        with:
          context: ./queryvault
          file: ./queryvault/Dockerfile
          push: true
          tags: jyothika2832/ai_security_v2-3-queryvault:latest

      # ── Dashboard ──
      - name: Build & Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: jyothika2832/ai_security_v2-3-dashboard:latest
