name: Build, Push, and Deploy (CI/CD)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Build & Push XenSQL ──
      - name: Build and Push XenSQL
        uses: docker/build-push-action@v5
        with:
          context: ./xensql
          file: ./xensql/Dockerfile
          push: true
          tags: jyothika2832/ai_security_v2-3-xensql:latest

      # ── Build & Push QueryVault ──
      - name: Build and Push QueryVault
        uses: docker/build-push-action@v5
        with:
          context: ./queryvault
          file: ./queryvault/Dockerfile
          push: true
          tags: jyothika2832/ai_security_v2-3-queryvault:latest

      # ── Build & Push Dashboard ──
      - name: Build and Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: jyothika2832/ai_security_v2-3-dashboard:latest

  deploy-to-azure:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push # Waits for the build to finish
    
    steps:
      - name: SSH into Azure VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd ~/ai_security_deploy
            docker compose pull
            docker compose up -d
