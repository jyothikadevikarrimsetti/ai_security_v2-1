name: Build, Push, and Deploy (CI/CD)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deployment
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Build & Push XenSQL ──
      - name: Build and Push XenSQL
        uses: docker/build-push-action@v5
        with:
          context: ./xensql
          file: ./xensql/Dockerfile
          push: true
          tags: |
            jyothika2832/ai_security_v2-1-xensql:latest
            jyothika2832/ai_security_v2-1-xensql:${{ github.run_number }}

      # ── Build & Push QueryVault ──
      - name: Build and Push QueryVault
        uses: docker/build-push-action@v5
        with:
          context: ./queryvault
          file: ./queryvault/Dockerfile
          push: true
          tags: |
            jyothika2832/ai_security_v2-1-queryvault:latest
            jyothika2832/ai_security_v2-1-queryvault:${{ github.run_number }}

      # ── Build & Push Dashboard ──
      - name: Build and Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            jyothika2832/ai_security_v2-1-dashboard:latest
            jyothika2832/ai_security_v2-1-dashboard:${{ github.run_number }}

  deploy-to-azure:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH into Azure VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/ai_security_deploy
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            echo "Waiting for services to start..."
            sleep 10
            docker ps
